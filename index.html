<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Idea Vault</title>
    <style>
        /* Dark Mode Styling */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 16px;
            resize: vertical; /* Allows resizing only up and down */
        }

        textarea:focus {
            outline: none;
            border-color: #bb86fc; /* Subtle purple highlight when typing */
        }

        .btn {
            background-color: #bb86fc; 
            color: #121212;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #9b59b6;
        }

        #ideas-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .idea-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            line-height: 1.5;
            white-space: pre-wrap; /* Keeps line breaks from your textarea */
        }

        .delete-btn {
            background-color: #cf6679; /* Reddish color for delete */
            color: #121212;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .delete-btn:hover {
            background-color: #b33951;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💡 Idea Vault</h1>
        
        <textarea id="idea-input" placeholder="What's your next big idea?"></textarea>
        <button id="start-btn" class="btn">Start Idea</button>

        <div id="ideas-container">
            <!-- Ideas will appear here -->
        </div>
    </div>

    <script>
        // Grab elements from the page
        const input = document.getElementById('idea-input');
        const startBtn = document.getElementById('start-btn');
        const ideasContainer = document.getElementById('ideas-container');

        // Load existing ideas from local storage, or start with an empty array
        let ideas = JSON.parse(localStorage.getItem('savedIdeas')) || [];

        // Function to draw the ideas on the screen
        function renderIdeas() {
            ideasContainer.innerHTML = ''; // Clear the current list
            
            ideas.forEach((idea, index) => {
                const card = document.createElement('div');
                card.className = 'idea-card';

                const textSpan = document.createElement('span');
                textSpan.textContent = idea;

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.className = 'delete-btn';
                // When delete is clicked, remove it from the array
                deleteBtn.onclick = () => {
                    ideas.splice(index, 1);
                    saveAndRender();
                };

                card.appendChild(textSpan);
                card.appendChild(deleteBtn);
                ideasContainer.prepend(card); // Puts newest ideas at the top
            });
        }

        // Function to save to local storage and update the screen
        function saveAndRender() {
            localStorage.setItem('savedIdeas', JSON.stringify(ideas));
            renderIdeas();
        }

        // What happens when you click "Start Idea"
        startBtn.addEventListener('click', () => {
            const text = input.value.trim();
            if (text !== '') {
                ideas.push(text); // Add to our list
                input.value = ''; // Clear the text box
                saveAndRender(); // Save and update
            }
        });

        // Draw the ideas when the page first loads
        renderIdeas();
    </script>

</body>
</html>
